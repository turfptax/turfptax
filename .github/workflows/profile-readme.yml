name: Update profile README

on:
  schedule:
    # Daily at 07:17 UTC (~02:17 Lincoln, NE)
    - cron: '17 7 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/update_readme.py
      - .github/workflows/profile-readme.yml

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update README activity block
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No README changes; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): refresh activity block [skip ci]"
          git push
